<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chinese Writing Lab</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  body { touch-action: none; -webkit-tap-highlight-color: transparent; margin: 0; background-color: #FDF6E3; font-family: sans-serif; height: 100vh; display: flex; }
  #sidebar { width: 140px; background: #FFF; border-right: 2px solid #FFD166; padding: 10px; overflow-y: auto; }
  .nav-item { padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: center; border: 1px solid #ddd; border-radius: 5px; font-size: 18px; position: relative; }
  .nav-item.done { background-color: #D4EDDA; border-color: #C3E6CB; }
  #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
  .progress-bar { font-size: 16px; font-weight: bold; color: #555; margin-bottom: 5px; }
  .grid-box { width: 250px; height: 250px; background: white; border: 3px solid #ffcc66; }
  button { padding: 8px 15px; background: #FFD166; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
  #speaker-icon { cursor: pointer; font-size: 24px; margin-left: 10px; vertical-align: middle; }
  #word-context { font-size: 16px; color: #333; margin-top: 5px; }
  .word-label { font-weight: bold; color: #555; }
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
    <div class="progress-bar" id="progress-text">已完成: 0 / 0</div>
    <div style="text-align:center;">
        <div style="font-weight:bold; font-size:32px;">
            <span id="char-info"></span>
            <span id="speaker-icon" onclick="speakFromInfo()">🔊</span>
        </div>
        <div id="word-context"><span class="word-label">组词 (Words): </span><span id="word-value"></span></div>
    </div>
    <div id="score-display" style="color:#E76F51; font-weight:bold; height: 20px;"></div>
    
    <div style="display:flex; gap:20px;">
        <div style="text-align:center;">
            <div id="demo-box" class="grid-box"></div>
            <div style="font-size:12px; font-weight:bold; margin:5px 0;">Demo | 演示</div>
            <button type="button" onclick="playDemo()">🔄 Replay</button>
        </div>
        <div style="text-align:center;">
            <div id="quiz-box" class="grid-box"></div>
            <div style="font-size:12px; font-weight:bold; margin:5px 0;">Practice | 描红</div>
            <button type="button" onclick="initQuiz()">🔄 Reset</button>
        </div>
    </div>
</div>

<script>
    const words = [
        {char: "你", p: "nǐ", word: "你好 (Hello)、你们 (You all)"}, 
        {char: "好", p: "hǎo", word: "好人 (Good person)、你好 (Hello)"}, 
        {char: "们", p: "men", word: "你们 (You all)、他们 (They)"}, 
        {char: "叫", p: "jiào", word: "叫名字 (Call name)"}, 
        {char: "什", p: "shén", word: "什么 (What)"}, 
        {char: "么", p: "me", word: "什么 (What)"}, 
        {char: "名", p: "míng", word: "名字 (Name)、有名 (Famous)"}, 
        {char: "字", p: "zì", word: "名字 (Name)、汉字 (Chinese character)"}, 
        {char: "我", p: "wǒ", word: "我们 (We)"}, 
        {char: "他", p: "tā", word: "他们 (They)、他人 (Others)"}, 
        {char: "呢", p: "ne", word: "你呢 (And you?)"}, 
        {char: "是", p: "shì", word: "是中国人 (Is Chinese)"}, 
        {char: "哪", p: "nǎ", word: "哪国 (Which country)、哪里 (Where)"}, 
        {char: "国", p: "guó", word: "中国 (China)、哪国 (Which country)"}, 
        {char: "人", p: "rén", word: "中国人 (Chinese person)"}, 
        {char: "也", p: "yě", word: "我也是 (Me too)"}, 
        {char: "她", p: "tā", word: "她们 (They)"}, 
        {char: "谁", p: "shéi", word: "是谁 (Who is it?)"}, 
        {char: "的", p: "de", word: "我的 (My)、他的 (His)"}, 
        {char: "同", p: "tóng", word: "同学 (Classmate)"}, 
        {char: "学", p: "xué", word: "同学 (Classmate)、学生 (Student)"}
    ].map(w => ({...w, done: false}));

    let index = 0, demoWriter, quizWriter;

    function speak(txt) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'zh-CN';
        window.speechSynthesis.speak(msg);
    }
    
    function speakFromInfo() { speak(words[index].char); }

    function updateDisplay() {
        document.getElementById('char-info').innerText = `${words[index].char} (${words[index].p})`;
        document.getElementById('word-value').innerText = words[index].word;
    }

    function updateProgress() {
        const completed = words.filter(w => w.done).length;
        document.getElementById('progress-text').innerText = `已完成: ${completed} / ${words.length}`;
        renderSidebar();
    }

    function playDemo() {
        document.getElementById('demo-box').innerHTML = '';
        demoWriter = HanziWriter.create('demo-box', words[index].char, {width: 250, height: 250, padding: 20});
        demoWriter.animateCharacter();
    }

    function initQuiz() {
        document.getElementById('quiz-box').innerHTML = '';
        document.getElementById('score-display').innerText = '';
        let errCount = 0;
        quizWriter = HanziWriter.create('quiz-box', words[index].char, {
            width: 250, height: 250, padding: 20,
            showOutline: true, mistakeColor: '#FF0000',
            onMistake: function() { errCount++; },
            onComplete: function() {
                document.getElementById('score-display').innerText = "Perfect! 完美!";
                if (!words[index].done) {
                    words[index].done = true;
                    updateProgress();
                }
            }
        });
        quizWriter.quiz();
    }

    function renderSidebar() {
        const sb = document.getElementById('sidebar');
        sb.innerHTML = '';
        words.forEach((w, i) => {
            const div = document.createElement('div');
            div.className = 'nav-item ' + (w.done ? 'done' : '');
            div.innerText = w.char + (w.done ? ' ✅' : '');
            div.onclick = function() {
                index = i;
                updateDisplay();
                playDemo();
                initQuiz();
                renderSidebar();
            };
            sb.appendChild(div);
        });
    }

    // 初始化
    updateDisplay();
    updateProgress();
    renderSidebar();
    playDemo();
    initQuiz();
</script>
</body>
</html>
